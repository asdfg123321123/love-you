<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给你的一句话</title>
<style>
  body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #ffe6e9; font-family: sans-serif; overflow: hidden; }
  .content { text-align: center; z-index: 10; }
  h1 { font-size: 3rem; color: #ff4d6d; animation: beat 1s infinite; }
  @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  .bg-heart { position: absolute; font-size: 2rem; opacity: 0.3; animation: float 5s infinite linear; }
  @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }
</style>
</head>
<body>
  <div class="content">
    <h1>我爱你</h1>
    <p>点开这一刻，只想告诉你</p>
  </div>
  <script>
    // 动态生成背景爱心
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('bg-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 2 + 3 + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }, 300);
  </script>
</body>
</html>
